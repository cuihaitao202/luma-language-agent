name: Refresh regional language pulse

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/update-language-pulse.mjs
      - name: Commit verified pulse when changed
        id: commit
        run: |
          git config user.name "luma-language-pulse"
          git config user.email "actions@users.noreply.github.com"
          git add public/language-pulse.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Refresh regional language pulse"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish refreshed pulse
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
