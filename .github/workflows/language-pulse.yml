name: Refresh regional language pulse

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/update-language-pulse.mjs
      - name: Commit verified pulse when changed
        run: |
          git config user.name "luma-language-pulse"
          git config user.email "actions@users.noreply.github.com"
          git add public/language-pulse.json
          git diff --cached --quiet || git commit -m "Refresh regional language pulse"
          git push
